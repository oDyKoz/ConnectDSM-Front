<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styleAll.css">
    <link rel="stylesheet" href="../css/stylePageLogin.css">

    <link rel="shortcut icon" href="../assets/icon/favicon.ico" type="image/x-icon">

    <title>Cadastro | Connect</title>

    <!-- Frameworks -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<!-- Nav Fixo -->
<nav class="nav-between">

    <!-- Icone reciclavel - Icone do Projeto -->
    <section class="flex justify-start items-center gap-3 pl-5">
        <div>
            <img src="../assets/icon/Icone.svg" alt="Icone do aplicativo" class="size-img-icon">
        </div>
    </section>
</nav>

<body class="bg-[#A2DCF2]">
    <main>
        <!-- Corpo dos conteudos da página. -->
        <section class="flex justify-around">
            <!-- Imagem de ilustração -->
            <div class="illustrationBodyLogin">
                <div class="illustrationContentLogin">
                    <img src="../assets/img/ilustração/ilustração.svg" alt="Ilustração de Entrada">
                </div>
            </div>


            <!-- Campo de Cadastro -->
            <div class="bodyCadastro pt-50">
                <div class="contentCadastro bg-[#444444]/15">
                    <h1 class="textColor_002F88 text-[40px]"><strong>VOCÊ É?</strong></h1>
                    <p class="textColor_002F88">Para continuar, você concorda com os <br><u>Termos</u> e
                        <u>Privacidade</u>.</p>
                    <p class="textColor_1F6FFE"><a href="">Saiba Mais.</a></p>
                    <form action="feed.html" method="get" class="flex flex-col gap-5 pt-10">
                        <label for="btnLoginAluno" class="flex justify-center bg-[#1F6FFE]/50 p-5 rounded-xl btnOpcao">
                            <img src="../assets/icon/Book-one.svg" alt="Imagem Aluno" class="w-10">
                            <h3 class="textColor_002F88 text-[30px]">Aluno</h3>
                        </label>
                        <input type="submit" id="btnLoginAluno" value=" ">
                    </form>
                    <p class="textColor_002F88 pt-30"><strong>OU</strong></p>
                    <form action="feed.html" method="get" class="flex flex-col gap-5 pt-30">
                        <label for="btnLoginEmpresa" class="flex justify-center bg-[#1F6FFE]/50 p-5 rounded-xl btnOpcao">
                            <img src="../assets/icon/Building-two.svg" alt="Imagem Empresa" class="w-10">
                            <h3 class="textColor_002F88 text-[30px]">Empresa</h3>
                        </label>
                        <input type="submit" id="btnLoginEmpresa" value=" ">
                    </form>
                    <button class="textColor_002F88 text-[15px] pt-30"><a href="feed.html">Tenho cadastro.</a></button>
                </div>
            </div>
        </section>
    </main>
</body>
